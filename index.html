<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoidCraft | Enter the Void</title> <style>
        /* Deep Dark Blue Theme - No Changes */
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #0a192f 0%, #020c1b 100%);
            color: #e6f1ff;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: flex-end;
            padding: 25px 60px;
            gap: 20px;
            align-items: center;
            z-index: 10;
        }

        .login-btn {
            color: #8892b0;
            background: none;
            border: none;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover { color: #64ffda; }

        .signup-btn {
            background-color: transparent;
            color: #64ffda;
            border: 1px solid #64ffda;
            padding: 10px 22px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .signup-btn:hover { background-color: rgba(100, 255, 218, 0.1); }

        /* Hero Section */
        .hero {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding-bottom: 80px;
        }

        h1 {
            font-size: clamp(50px, 12vw, 100px);
            margin: 0;
            font-weight: 800;
            color: #ccd6f6;
            letter-spacing: -2px;
        }

        .sub-text {
            color: #8892b0;
            font-size: 18px;
            margin-top: 5px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .get-started {
            margin-top: 65px;
            padding: 20px 65px;
            font-size: 18px;
            font-weight: 700;
            color: #0a192f;
            background-color: #64ffda;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(100, 255, 218, 0.2);
            transition: 0.3s;
        }

        /* GOOGLE AUTH MODAL STYLE */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(2, 12, 27, 0.9);
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background-color: #112240;
            margin: 15% auto;
            padding: 30px;
            border-radius: 16px;
            width: 320px;
            text-align: center;
            border: 1px solid #233554;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .modal-content h2 { color: #ccd6f6; font-size: 20px; margin-bottom: 20px; }

        .google-btn {
            width: 100%;
            padding: 12px;
            background-color: white;
            color: #1f1f1f;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.2s;
        }

        .google-btn:hover { background-color: #f1f1f1; transform: translateY(-2px); }

        .google-icon { width: 18px; height: 18px; }

        .close-btn { color: #8892b0; float: right; font-size: 28px; cursor: pointer; margin-top: -10px; }
    </style>
</head>
<body>

    <nav>
        <button class="login-btn" onclick="openModal()">Login</button>
        <button class="signup-btn" onclick="openModal()">Sign Up</button>
    </nav>

    <div class="hero">
        <h1>VoidCraft</h1>
        <p class="sub-text">Beyond the horizon</p>
        <button class="get-started">Get Started</button>
    </div>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Continue with VoidCraft</h2>
            <button class="google-btn" onclick="googleSignIn()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_勇敢_Logo.svg" class="google-icon" alt="G">
                Continue with Google
            </button>
            <p style="color: #8892b0; font-size: 12px; margin-top: 20px;">By continuing, you agree to our Terms.</p>
        </div>
    </div>

    <script>
        const modal = document.getElementById("authModal");

        function openModal() {
            modal.style.display = "block";
        }

        function closeModal() {
            modal.style.display = "none";
        }

        function googleSignIn() {
            // Asli Google login ke liye Firebase ya Auth0 chahiye hota hai
            // Filhal hum demo ke liye alert aur redirect dikhayenge
            alert("Redirecting to Google Login...");
            window.location.href = "https://accounts.google.com/";
        }

        window.onclick = function(event) {
            if (event.target == modal) { closeModal(); }
        }
    </script>

</body>
</html>
