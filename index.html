<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyViper | 2D Gaming Hub</title>
    <style>
        /* Base Styling */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            height: 100vh;
            background: radial-gradient(circle at center, #1e1e2f 0%, #0a0a0c 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* Glassmorphism Lobby Card */
        .lobby-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 60px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-size: 4rem;
            letter-spacing: 5px;
            background: linear-gradient(to right, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            font-weight: 900;
        }

        p.tagline {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        /* Buttons Section */
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            text-decoration: none;
        }

        .btn-primary { background: #4facfe; color: white; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }

        .btn:hover { transform: translateY(-3px); filter: brightness(1.2); }

        /* Modal (Login/Signup Popups) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center; align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: #161b22;
            padding: 40px;
            border-radius: 20px;
            width: 350px;
            border: 1px solid #30363d;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #0d1117;
            border: 1px solid #30363d;
            color: white;
            border-radius: 8px;
        }

        .close-btn {
            color: #888;
            float: right;
            cursor: pointer;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="lobby-container">
        <h1>SKYVIPER</h1>
        <p class="tagline">All 2D Games In One Website</p>
        
        <div class="btn-group">
            <button class="btn btn-primary" onclick="openModal('login')">Login</button>
            <button class="btn btn-secondary" onclick="openModal('signup')">Sign Up</button>
        </div>
    </div>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" style="margin-bottom: 20px;">Login</h2>
            <form id="authForm">
                <input type="email" placeholder="Email Address" required>
                <input type="password" placeholder="Password" required>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 15px;">Continue</button>
            </form>
        </div>
    </div>

    <script>
        const modal = document.getElementById('authModal');
        const modalTitle = document.getElementById('modalTitle');

        function openModal(type) {
            modal.style.display = 'flex';
            modalTitle.innerText = type === 'login' ? 'Welcome Back' : 'Create Account';
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        // Form Submission Logic
        document.getElementById('authForm').onsubmit = function(e) {
            e.preventDefault();
            const email = e.target.querySelector('input[type="email"]').value;
            alert('Aapka data "SkyViper" system mein receive ho gaya!\nEmail: ' + email);
            closeModal();
        };

        // Click outside to close
        window.onclick = function(event) {
            if (event.target == modal) closeModal();
        }
    </script>
</body>
</html>
