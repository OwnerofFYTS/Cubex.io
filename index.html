<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Viper | Pro Edition</title>
    <style>
        body { margin: 0; padding: 0; background: #020c1b; color: #e6f1ff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* UI OVERLAY (Using your exact style) */
        #game-view { display: none; position: fixed; inset: 0; z-index: 1000; background: #000; }
        
        #ui-layer { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 1010; }
        .stat-text { font-size: 20px; color: #fff; text-shadow: 2px 2px #000; margin-bottom: 5px; font-weight: bold; }
        
        /* HEALTH BAR */
        .health-bg { width: 200px; height: 15px; background: #550000; border: 2px solid #fff; }
        #health-bar { width: 100%; height: 100%; background: #64ffda; transition: width 0.3s; }

        .hero { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        h1 { font-size: 80px; margin: 0; color: #ccd6f6; font-weight: 800; }
        
        .btn-start { margin-top: 50px; padding: 20px 60px; background: #64ffda; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 18px; color: #020c1b; }

        /* GAME OVER SCREEN */
        #game-over-screen { display: none; position: fixed; inset: 0; background: rgba(2, 12, 27, 0.9); color: #64ffda; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }

        canvas { display: block; }
    </style>
</head>
<body>

    <div class="hero" id="home-hero">
        <h1>Sky Viper</h1>
        <button class="btn-start" onclick="launchGame()">START GAME</button>
    </div>

    <div id="game-view">
        <div id="ui-layer">
            <div class="stat-text" id="score-display">Score: 0</div>
            <div class="stat-text" id="high-score-display">High Score: 0</div>
            <div class="health-bg"><div id="health-bar"></div></div>
        </div>

        <div id="game-over-screen">
            <h1 style="color: #ff4d4d;">GAME OVER</h1>
            <p id="final-score" style="font-size: 24px; color: #ccd6f6;"></p>
            <button class="btn-start" onclick="location.reload()">RESTART</button>
        </div>

        <canvas id="sky-canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('sky-canvas');
        const ctx = canvas.getContext('2d');
        let gameActive = false;
        let score = 0;
        let highScore = localStorage.getItem('skyViperHighScore') || 0;
        let health = 100;
        
        const keys = {};
        const player = { x: 100, y: 300, w: 50, h: 50, speed: 6 };
        let bullets = [];
        let enemies = [];
        let enemyBullets = [];
        let explosions = [];

        function launchGame() {
            document.getElementById('home-hero').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            document.getElementById('high-score-display').innerText = `High Score: ${highScore}`;
            gameActive = true;
            
            // Enemy Spawn Interval
            setInterval(() => {
                if(gameActive) spawnEnemy();
            }, 1000);

            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if(e.code === 'Space' && gameActive) shoot();
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        function spawnEnemy() {
            enemies.push({
                x: canvas.width + 50,
                y: Math.random() * (canvas.height - 100) + 50,
                w: 50, h: 50,
                speed: Math.random() * 2 + 3,
                lastShot: Date.now(),
                shootDelay: Math.random() * 1000 + 1500
            });
        }

        function shoot() {
            bullets.push({ x: player.x + 50, y: player.y + 22, w: 15, h: 4, speed: 12 });
        }

        function enemyShoot(en) {
            const dx = player.x - en.x;
            const dy = player.y - en.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            enemyBullets.push({
                x: en.x, y: en.y + 25,
                vx: (dx/dist) * 6,
                vy: (dy/dist) * 6
            });
        }

        function update() {
            if(!gameActive) return;

            // Player Movement (Pygame Logic)
            if (keys['ArrowUp'] || keys['KeyW']) player.y -= player.speed;
            if (keys['ArrowDown'] || keys['KeyS']) player.y += player.speed;
            if (keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed;
            if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;

            player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
            player.y = Math.max(0, Math.min(canvas.height - player.h, player.y));

            // Bullets Update
            bullets.forEach((b, i) => {
                b.x += b.speed;
                if(b.x > canvas.width) bullets.splice(i, 1);
            });

            // Enemy Update
            enemies.forEach((en, i) => {
                en.x -= en.speed;
                if(en.x < -50) enemies.splice(i, 1);

                if(Date.now() - en.lastShot > en.shootDelay) {
                    enemyShoot(en);
                    en.lastShot = Date.now();
                }

                // Check Bullet Hit Enemy
                bullets.forEach((b, bi) => {
                    if(checkCollision(b, en)) {
                        bullets.splice(bi, 1);
                        enemies.splice(i, 1);
                        score += 10;
                        explosions.push({x: en.x, y: en.y, timer: 15});
                        document.getElementById('score-display').innerText = `Score: ${score}`;
                    }
                });

                // Player-Enemy Collision
                if(checkCollision(player, en)) {
                    health = 0;
                    endGame();
                }
            });

            // Enemy Bullets Update
            enemyBullets.forEach((eb, i) => {
                eb.x += eb.vx;
                eb.y += eb.vy;
                if(checkCollision(eb, player, 10, 10)) {
                    enemyBullets.splice(i, 1);
                    health -= 20;
                    document.getElementById('health-bar').style.width = health + '%';
                    if(health <= 0) endGame();
                }
            });

            // Explosions timer
            explosions.forEach((ex, i) => {
                ex.timer--;
                if(ex.timer <= 0) explosions.splice(i, 1);
            });
        }

        function draw() {
            ctx.fillStyle = '#020c1b';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Player (Teal)
            ctx.fillStyle = '#64ffda';
            ctx.fillRect(player.x, player.y, player.w, player.h);

            // Draw Bullets
            ctx.fillStyle = '#ff4d4d';
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

            // Draw Enemy Bullets
            ctx.fillStyle = '#ffff00';
            enemyBullets.forEach(eb => {
                ctx.beginPath();
                ctx.arc(eb.x, eb.y, 5, 0, Math.PI*2);
                ctx.fill();
            });

            // Draw Enemies
            ctx.fillStyle = '#8892b0';
            enemies.forEach(en => ctx.fillRect(en.x, en.y, en.w, en.h));

            // Draw Explosions
            explosions.forEach(ex => {
                ctx.fillStyle = '#ffa500';
                ctx.beginPath();
                ctx.arc(ex.x + 25, ex.y + 25, 30, 0, Math.PI*2);
                ctx.fill();
            });
        }

        function checkCollision(obj1, obj2, w1=null, h1=null) {
            let width1 = w1 || obj1.w || 15;
            let height1 = h1 || obj1.h || 4;
            return obj1.x < obj2.x + 50 && obj1.x + width1 > obj2.x &&
                   obj1.y < obj2.y + 50 && obj1.y + height1 > obj2.y;
        }

        function endGame() {
            gameActive = false;
            if(score > highScore) {
                highScore = score;
                localStorage.setItem('skyViperHighScore', highScore);
            }
            document.getElementById('game-over-screen').style.display = 'flex';
            document.getElementById('final-score').innerText = `Final Score: ${score}`;
        }

        function gameLoop() {
            update();
            draw();
            if(gameActive) requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
