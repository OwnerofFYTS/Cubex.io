<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Aura</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            color: #4a0000;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* Flashlight - pointer-events none taake button click ho sake */
        #flashlight {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle 150px at center, transparent 10%, rgba(0, 0, 0, 0.98) 100%);
            pointer-events: none;
            z-index: 100;
        }

        #world {
            position: relative;
            width: 100%; height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s ease;
        }

        #game-content {
            text-align: center;
            transition: transform 0.1s linear;
        }

        h1 { font-size: 4rem; letter-spacing: 15px; text-shadow: 0 0 10px #ff0000; }

        .btn-start {
            padding: 15px 30px;
            background: transparent;
            border: 1px solid #4a0000;
            color: #8b0000;
            font-size: 1.2rem;
            cursor: pointer;
            position: relative;
            z-index: 110; /* Button ko sab se upar rakha hai */
        }

        #jumpscare {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://i.imgur.com/vH97Z9O.jpg') center/cover;
            z-index: 1000;
        }

        #status {
            position: fixed;
            bottom: 20px; left: 20px;
            font-size: 0.9rem;
            color: #333;
        }
    </style>
</head>
<body>

    <div id="flashlight"></div>

    <div id="world">
        <div id="game-content">
            <h1>VOID AURA</h1>
            <p id="msg">Andhera tumhe dekh raha hai...</p>
            <button class="btn-start" onclick="startGame()">PLAY / START SENSORS</button>
        </div>
    </div>

    <div id="jumpscare"></div>
    <div id="status">STATUS: STANDING</div>

    <audio id="scare-sound" src="https://www.soundjay.com/human/sounds/shriek-01.mp3"></audio>

    <script>
        const flashlight = document.getElementById('flashlight');
        const world = document.getElementById('world');
        const gameContent = document.getElementById('game-content');
        const statusText = document.getElementById('status');
        const jumpscare = document.getElementById('jumpscare');
        const scareSound = document.getElementById('scare-sound');

        let x = 0, y = 0, z = 1;
        let isCrouching = false;

        // Flashlight follow mouse
        document.addEventListener('mousemove', (e) => {
            flashlight.style.background = `radial-gradient(circle 150px at ${e.clientX}px ${e.clientY}px, transparent 10%, rgba(0, 0, 0, 0.98) 80%)`;
        });

        // Movement Logic
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') z += 0.05; // Agey (Zoom in)
            if (key === 's') z -= 0.05; // Peeche (Zoom out)
            if (key === 'a') x += 20;   // Left
            if (key === 'd') x -= 20;   // Right

            if (key === 'c') {
                isCrouching = true;
                world.style.transform = "translateY(100px)";
                statusText.innerText = "STATUS: CROUCHED";
                console.log("Crouched");
            }

            gameContent.style.transform = `translate(${x}px, ${y}px) scale(${z})`;
        });

        document.addEventListener('keyup', (e) => {
            if (e.key.toLowerCase() === 'c') {
                isCrouching = false;
                world.style.transform = "translateY(0px)";
                statusText.innerText = "STATUS: STANDING";
            }
        });

        function startGame() {
            document.getElementById('msg').innerText = "Ab bhago...";
            // Jumpscare 5 second baad trigger hoga
            setTimeout(() => {
                jumpscare.style.display = 'block';
                scareSound.play().catch(e => console.log("Audio play error"));
                setTimeout(() => { jumpscare.style.display = 'none'; }, 1500);
            }, 5000);
        }
    </script>
</body>
</html>
