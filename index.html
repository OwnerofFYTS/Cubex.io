<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID AURA | HORROR PROTOCOL</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; color: #fff; font-family: 'Courier New', Courier, monospace; }
        #game-wrapper { position: relative; width: 100%; height: 100vh; }
        
        /* Professional Dark Menu */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a0000 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; transition: opacity 0.8s;
        }

        h1 { font-size: 4rem; letter-spacing: 12px; margin: 0; color: #fff; text-shadow: 0 0 20px #f00; }
        .subtitle { color: #ff3e3e; margin-bottom: 40px; letter-spacing: 5px; font-size: 0.9rem; opacity: 0.6; }

        #play-button {
            padding: 15px 60px; background: transparent; border: 2px solid #ff3e3e;
            color: #ff3e3e; font-size: 1.2rem; cursor: pointer; transition: 0.3s;
            letter-spacing: 5px; font-weight: bold;
        }
        #play-button:hover { background: #ff3e3e; color: white; box-shadow: 0 0 30px #ff3e3e; }

        /* HUD */
        #reticle {
            position: absolute; top: 50%; left: 50%; width: 6px; height: 6px;
            background: rgba(255, 0, 0, 0.7); border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; display: none; z-index: 50; box-shadow: 0 0 5px red;
        }

        /* Game Over Screen */
        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(40, 0, 0, 0.9); display: none; z-index: 200;
            flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="ui-layer">
        <h1>VOID AURA</h1>
        <div class="subtitle">HE IS FASTER THAN YOU</div>
        <button id="play-button">PLAY</button>
        <p style="margin-top: 20px; color: #444; font-size: 0.8rem;">WASD: Move | Space: Jump | Shift: Crouch</p>
    </div>

    <div id="game-over">
        <h1 style="color: #ff0000; text-shadow: 0 0 30px black;">GAME OVER</h1>
        <p style="letter-spacing: 3px;">THE RED BLOCK CAUGHT YOU</p>
        <button onclick="location.reload()" style="margin-top:20px; padding:10px 30px; background:none; border:1px solid white; color:white; cursor:pointer;">RESTART</button>
    </div>

    <div id="reticle"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>

<script>
    // Scene Setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
    scene.fog = new THREE.Fog(0x000000, 1, 20);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('game-wrapper').appendChild(renderer.domElement);

    // Player Group
    const player = new THREE.Group();
    player.position.set(0, 1.7, 0);
    scene.add(player);
    player.add(camera);

    // Light (Flashlight)
    const light = new THREE.SpotLight(0xffffff, 1.5, 15, Math.PI/6, 0.5);
    camera.add(light);
    light.target.position.set(0, 0, -1);
    camera.add(light.target);

    // Floor
    const grid = new THREE.GridHelper(200, 100, 0x220000, 0x050505);
    scene.add(grid);

    // RED BLOCK (The Chaser)
    const stalker = new THREE.Mesh(
        new THREE.BoxGeometry(1.2, 3, 1.2),
        new THREE.MeshBasicMaterial({ color: 0xff0000 })
    );
    stalker.position.set(10, 1.5, 20); // Start position
    scene.add(stalker);

    // Controls Logic
    const controls = new THREE.PointerLockControls(camera, document.body);
    const playBtn = document.getElementById('play-button');
    const ui = document.getElementById('ui-layer');

    playBtn.onclick = () => controls.lock();
    controls.addEventListener('lock', () => { 
        ui.style.opacity = '0'; 
        setTimeout(()=> ui.style.display = 'none', 800);
        document.getElementById('reticle').style.display = 'block';
    });

    let moveF = false, moveB = false, moveL = false, moveR = false, isCrouching = false, canJump = false;
    let velocity = new THREE.Vector3();
    
    // Normal Speed Config
    const PLAYER_SPEED = 28.0; 
    const STALKER_SPEED = PLAYER_SPEED * 1.01; // 1% faster than player

    document.onkeydown = (e) => {
        if(e.code === 'KeyW') moveF = true;
        if(e.code === 'KeyS') moveB = true;
        if(e.code === 'KeyA') moveL = true;
        if(e.code === 'KeyD') moveR = true;
        if(e.code === 'Space' && canJump) { velocity.y = 8; canJump = false; }
        if(e.code === 'ShiftLeft') isCrouching = true;
    };
    document.onkeyup = (e) => {
        if(e.code === 'KeyW') moveF = false;
        if(e.code === 'KeyS') moveB = false;
        if(e.code === 'KeyA') moveL = false;
        if(e.code === 'KeyD') moveR = false;
        if(e.code === 'ShiftLeft') isCrouching = false;
    };

    let lastTime = performance.now();
    function animate() {
        requestAnimationFrame(animate);
        const time = performance.now();
        const delta = (time - lastTime) / 1000;

        if (controls.isLocked) {
            // Player Physics
            const friction = 10;
            velocity.x -= velocity.x * friction * delta;
            velocity.z -= velocity.z * friction * delta;
            velocity.y -= 22 * delta; // Gravity

            if (moveF) velocity.z -= PLAYER_SPEED * delta;
            if (moveB) velocity.z += PLAYER_SPEED * delta;
            if (moveL) velocity.x -= PLAYER_SPEED * delta;
            if (moveR) velocity.x += PLAYER_SPEED * delta;

            controls.moveRight(velocity.x * delta);
            controls.moveForward(-velocity.z * delta);

            // Crouch & Jump Logic
            let targetHeight = isCrouching ? 0.8 : 1.7;
            player.position.y += (targetHeight - player.position.y) * 0.12;
            player.position.y += velocity.y * delta;

            if (player.position.y < targetHeight) {
                velocity.y = 0; player.position.y = targetHeight; canJump = true;
            }

            // STALKER AI (1% Faster)
            const dir = new THREE.Vector3().subVectors(player.position, stalker.position).normalize();
            stalker.position.x += dir.x * (STALKER_SPEED * 0.15) * delta; // Scaled for frame rate
            stalker.position.z += dir.z * (STALKER_SPEED * 0.15) * delta;
            stalker.lookAt(player.position.x, 1.5, player.position.z);

            // Death Check
            const dist = player.position.distanceTo(stalker.position);
            if(dist < 1.8) {
                document.getElementById('game-over').style.display = 'flex';
                controls.unlock();
            }
        }
        lastTime = time;
        renderer.render(scene, camera);
    }
    animate();

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
