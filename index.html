<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID AURA | HORROR PROTOCOL</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; color: #fff; font-family: 'Courier New', Courier, monospace; }
        #game-wrapper { position: relative; width: 100%; height: 100vh; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a0000 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; transition: opacity 0.8s;
        }

        h1 { font-size: 4rem; letter-spacing: 12px; margin: 0; color: #fff; text-shadow: 0 0 20px #f00; }
        .subtitle { color: #ff3e3e; margin-bottom: 40px; letter-spacing: 5px; font-size: 0.9rem; opacity: 0.6; }

        #play-button {
            padding: 15px 60px; background: transparent; border: 2px solid #ff3e3e;
            color: #ff3e3e; font-size: 1.2rem; cursor: pointer; transition: 0.3s;
            letter-spacing: 5px; font-weight: bold;
        }
        #play-button:hover { background: #ff3e3e; color: white; box-shadow: 0 0 30px #ff3e3e; }

        #reticle {
            position: absolute; top: 50%; left: 50%; width: 6px; height: 6px;
            background: rgba(255, 0, 0, 0.7); border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; display: none; z-index: 50;
        }

        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(40, 0, 0, 0.95); display: none; z-index: 200;
            flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="ui-layer">
        <h1>VOID AURA</h1>
        <div class="subtitle">HE IS FASTER THAN YOU</div>
        <button id="play-button">PLAY</button>
    </div>

    <div id="game-over">
        <h1 style="color: #ff0000;">GAME OVER</h1>
        <p>THE RED BLOCK CAUGHT YOU</p>
        <button onclick="location.reload()" style="margin-top:20px; padding:10px 30px; background:none; border:1px solid white; color:white; cursor:pointer;">RESTART</button>
    </div>

    <div id="reticle"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>

<script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020202);
    // Fog ko thora kam kiya taake rasta nazar aaye
    scene.fog = new THREE.Fog(0x020202, 1, 45);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('game-wrapper').appendChild(renderer.domElement);

    const player = new THREE.Group();
    player.position.set(0, 1.7, 0);
    scene.add(player);
    player.add(camera);

    // Flashlight aur Ambient Light taake andhera bilkul black na ho
    const ambient = new THREE.AmbientLight(0xffffff, 0.1); 
    scene.add(ambient);

    const flashlight = new THREE.SpotLight(0xffffff, 2, 30, Math.PI/4, 0.3);
    camera.add(flashlight);
    flashlight.target.position.set(0, 0, -1);
    camera.add(flashlight.target);

    // Floor Grid (Visual guide)
    const grid = new THREE.GridHelper(300, 100, 0x440000, 0x111111);
    scene.add(grid);

    // RED BLOCK (The Stalker)
    const stalkerGeo = new THREE.BoxGeometry(1.5, 3.5, 1.5);
    const stalkerMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
    const stalker = new THREE.Mesh(stalkerGeo, stalkerMat);
    stalker.position.set(0, 1.75, 25); // Thora qareeb rakha hai taake dikhai de
    scene.add(stalker);

    const controls = new THREE.PointerLockControls(camera, document.body);
    const playBtn = document.getElementById('play-button');
    const ui = document.getElementById('ui-layer');

    playBtn.onclick = () => controls.lock();
    controls.addEventListener('lock', () => { 
        ui.style.display = 'none';
        document.getElementById('reticle').style.display = 'block';
    });
    controls.addEventListener('unlock', () => { 
        if(document.getElementById('game-over').style.display !== 'flex') {
            ui.style.display = 'flex';
        }
    });

    let moveF = false, moveB = false, moveL = false, moveR = false, isCrouching = false, canJump = false;
    let velocity = new THREE.Vector3();
    
    const PLAYER_SPEED = 25.0; 
    const STALKER_SPEED = PLAYER_SPEED * 1.01; 

    document.onkeydown = (e) => {
        if(e.code === 'KeyW') moveF = true;
        if(e.code === 'KeyS') moveB = true;
        if(e.code === 'KeyA') moveL = true;
        if(e.code === 'KeyD') moveR = true;
        if(e.code === 'Space' && canJump) { velocity.y = 7.5; canJump = false; }
        if(e.code === 'ShiftLeft') isCrouching = true;
    };
    document.onkeyup = (e) => {
        if(e.code === 'KeyW') moveF = false;
        if(e.code === 'KeyS') moveB = false;
        if(e.code === 'KeyA') moveL = false;
        if(e.code === 'KeyD') moveR = false;
        if(e.code === 'ShiftLeft') isCrouching = false;
    };

    let lastTime = performance.now();
    function animate() {
        requestAnimationFrame(animate);
        const time = performance.now();
        const delta = (time - lastTime) / 1000;

        if (controls.isLocked) {
            velocity.x -= velocity.x * 10 * delta;
            velocity.z -= velocity.z * 10 * delta;
            velocity.y -= 20 * delta; 

            if (moveF) velocity.z -= PLAYER_SPEED * delta;
            if (moveB) velocity.z += PLAYER_SPEED * delta;
            if (moveL) velocity.x -= PLAYER_SPEED * delta;
            if (moveR) velocity.x += PLAYER_SPEED * delta;

            controls.moveRight(velocity.x * delta);
            controls.moveForward(-velocity.z * delta);

            let tH = isCrouching ? 0.8 : 1.7;
            player.position.y += (tH - player.position.y) * 0.1;
            player.position.y += velocity.y * delta;

            if (player.position.y < tH) { velocity.y = 0; player.position.y = tH; canJump = true; }

            // Stalker Movement - 1% faster
            const dir = new THREE.Vector3().subVectors(player.position, stalker.position);
            dir.y = 0; 
            dir.normalize();
            stalker.position.x += dir.x * (STALKER_SPEED * 0.13) * delta; 
            stalker.position.z += dir.z * (STALKER_SPEED * 0.13) * delta;
            stalker.lookAt(player.position.x, 1.75, player.position.z);

            // Distance check
            if(player.position.distanceTo(stalker.position) < 1.8) {
                document.getElementById('game-over').style.display = 'flex';
                controls.unlock();
            }
        }
        lastTime = time;
        renderer.render(scene, camera);
    }
    animate();

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
