<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VOID AURA - GHOST GIRL</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.85); color: #fff; z-index: 10; }
        #start { padding: 18px 60px; font-size: 22px; background: #8B0000; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; box-shadow: 0 0 15px #ff0000; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; transform: translate(-50%, -50%); pointer-events: none; z-index: 5; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(255,255,255,0.5); }
        #crosshair::before { width: 100%; height: 2px; top: 50%; }
        #crosshair::after { height: 100%; width: 2px; left: 50%; }
        #stamina { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 250px; height: 10px; background: #222; border: 1px solid #444; }
        #fill { height: 100%; width: 100%; background: #ff0000; }
    </style>
</head>
<body>

<div id="ui">
    <h1 style="color: #ff0000; letter-spacing: 5px; text-shadow: 2px 2px 10px #000;">VOID AURA</h1>
    <p>Woh aapko dhoond rahi hai...</p>
    <button id="start">PLAY MISSION</button>
</div>

<div id="crosshair"></div>
<div id="stamina"><div id="fill"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

<script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020202);
    scene.fog = new THREE.FogExp2(0x020202, 0.05);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputEncoding = THREE.sRGBEncoding; 
    document.body.appendChild(renderer.domElement);

    // Light Setup
    const ambient = new THREE.AmbientLight(0xffffff, 0.8); 
    scene.add(ambient);
    const flashLight = new THREE.PointLight(0xffffff, 1.2, 15);
    scene.add(flashLight);

    const player = new THREE.Group();
    player.position.set(0, 1.7, 0); 
    scene.add(player);
    player.add(camera);

    const controls = new THREE.PointerLockControls(camera, document.body);
    document.getElementById('start').onclick = () => controls.lock();
    controls.addEventListener('lock', () => { document.getElementById('ui').style.display='none'; });

    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(500, 500),
        new THREE.MeshStandardMaterial({ color: 0x050505 })
    );
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    /* --- LOAD GHOST GIRL (Isi Folder Mein) --- */
    let ghost = null;
    let mixer = null;
    const clock = new THREE.Clock();
    const loader = new THREE.GLTFLoader();

    // Loader logic with correct path
    loader.load('./ghost_girl.glb', function(gltf) {
        ghost = gltf.scene;
        ghost.scale.set(1.5, 1.5, 1.5); 
        ghost.position.set(25, 0, 25); 
        scene.add(ghost);

        mixer = new THREE.AnimationMixer(ghost);
        if(gltf.animations.length > 0) {
            mixer.clipAction(gltf.animations[0]).play();
        }
    }, undefined, function(e) {
        console.error("Model load nahi ho raha!", e);
    });

    let keys = {};
    onkeydown = e => keys[e.code] = true;
    onkeyup = e => keys[e.code] = false;

    let stamina = 100, velocityY = 0, canJump = true, dead = false;

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();

        if(mixer) mixer.update(delta);

        if(controls.isLocked && !dead) {
            let sprint = (keys['ShiftLeft'] && stamina > 0);
            let speed = sprint ? 0.32 : 0.15;

            if(sprint && (keys['KeyW']||keys['KeyA']||keys['KeyS']||keys['KeyD'])) stamina -= 1.1;
            else if(!keys['ShiftLeft']) stamina += 0.18;
            
            stamina = Math.max(0, Math.min(100, stamina));
            document.getElementById('fill').style.width = stamina + "%";

            let forward = new THREE.Vector3();
            camera.getWorldDirection(forward);
            forward.y = 0; forward.normalize();
            let side = new THREE.Vector3().crossVectors(camera.up, forward).normalize();
            
            let moveVec = new THREE.Vector3(0, 0, 0);
            if(keys['KeyW']) moveVec.add(forward);
            if(keys['KeyS']) moveVec.sub(forward);
            if(keys['KeyA']) moveVec.add(side);
            if(keys['KeyD']) moveVec.sub(side);

            if(moveVec.length() > 0) moveVec.normalize().multiplyScalar(speed);
            
            player.position.x += moveVec.x;
            player.position.z += moveVec.z;
            flashLight.position.copy(player.position);

            if(keys['Space'] && canJump) { velocityY = 0.2; canJump = false; }
            player.position.y += velocityY;
            velocityY -= 0.01;
            if(player.position.y <= 1.7) { player.position.y = 1.7; velocityY = 0; canJump = true; }

            /* GHOST AI */
            if(ghost) {
                let pPos = new THREE.Vector3();
                player.getWorldPosition(pPos);
                
                let dir = new THREE.Vector3().subVectors(pPos, ghost.position);
                dir.y = 0;
                let dist = ghost.position.distanceTo(pPos);
                dir.normalize();

                let aiSpeed = dist > 8 ? 0.22 : 0.14; 
                ghost.position.add(dir.multiplyScalar(aiSpeed));
                ghost.lookAt(pPos.x, 0, pPos.z); 

                if(dist < 1.6) {
                    dead = true;
                    controls.unlock();
                    alert("GAME OVER: Ghost Girl Caught You!");
                    location.reload();
                }
            }
        }
        renderer.render(scene, camera);
    }
    animate();

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
