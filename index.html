<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dark Corridor - Horror Game</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; }
        #ui { position: absolute; bottom: 20px; left: 20px; color: red; font-size: 20px; text-shadow: 2px 2px #000; pointer-events: none; }
        #instructions { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; text-align: center; }
    </style>
</head>
<body>

    <div id="instructions">
        <h1>THE DARK CORRIDOR</h1>
        <p>Click to Start</p>
        <p>(W,A,S,D to Walk | Mouse to Look)</p>
    </div>

    <div id="ui">BATTERY: 100%</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>

    <script>
        let scene, camera, renderer, controls, flashlight;
        let ghost;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.15); // Dhund (Fog)

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Floor
            const floorGeo = new THREE.PlaneGeometry(100, 100);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Walls (Corridor)
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x050505 });
            for(let i = -10; i < 10; i++) {
                const wallLeft = new THREE.Mesh(new THREE.BoxGeometry(1, 5, 10), wallMat);
                wallLeft.position.set(-3, 2.5, i * 10);
                scene.add(wallLeft);
                
                const wallRight = new THREE.Mesh(new THREE.BoxGeometry(1, 5, 10), wallMat);
                wallRight.position.set(3, 2.5, i * 10);
                scene.add(wallRight);
            }

            // Flashlight (SpotLight)
            flashlight = new THREE.SpotLight(0xffffff, 2, 15, Math.PI / 6, 0.5);
            camera.add(flashlight);
            flashlight.position.set(0, 0, 0);
            flashlight.target = new THREE.Object3D();
            camera.add(flashlight.target);
            flashlight.target.position.set(0, 0, -1);
            scene.add(camera);

            // Ghost (Scary Cube for now)
            const ghostGeo = new THREE.BoxGeometry(1, 2, 1);
            const ghostMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 });
            ghost = new THREE.Mesh(ghostGeo, ghostMat);
            ghost.position.set(0, 1, -15);
            scene.add(ghost);

            // Controls
            controls = new THREE.PointerLockControls(camera, document.body);
            document.body.addEventListener('click', () => {
                controls.lock();
                document.getElementById('instructions').style.display = 'none';
            });

            animate();
        }

        // Movement Logic
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        const onKeyDown = (e) => {
            if (e.code === 'KeyW') moveForward = true;
            if (e.code === 'KeyS') moveBackward = true;
        };
        const onKeyUp = (e) => {
            if (e.code === 'KeyW') moveForward = false;
            if (e.code === 'KeyS') moveBackward = false;
        };
        document.addEventListener('keydown', onKeyDown);
        document.addEventListener('keyup', onKeyUp);

        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked) {
                if (moveForward) controls.moveForward(0.05);
                if (moveBackward) controls.moveForward(-0.05);

                // Simple Ghost Jumpscare Logic
                let dist = camera.position.distanceTo(ghost.position);
                if(dist < 5) {
                    ghost.material.opacity = 1; // Ghost appears
                    ghost.position.z += 0.1;   // Ghost moves towards you
                }
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
