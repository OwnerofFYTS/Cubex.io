<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyViper | Gaming Lobby</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            height: 100vh;
            background: radial-gradient(circle at center, #1a1a2e 0%, #08080a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* Top Right Button */
        .navbar {
            position: absolute;
            top: 25px;
            right: 35px;
        }

        .nav-btn {
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid rgba(79, 172, 254, 0.5);
            background: rgba(255, 255, 255, 0.05);
            color: #4facfe;
            font-weight: 600;
            transition: 0.3s;
        }

        .nav-btn:hover { background: #4facfe; color: white; }

        /* Central Lobby Section */
        .main-lobby {
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 80px 100px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }

        h1 {
            font-size: 5.5rem;
            letter-spacing: 10px;
            background: linear-gradient(to right, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 15px rgba(79, 172, 254, 0.3));
        }

        .subtitle {
            color: #aaa;
            font-size: 1.2rem;
            letter-spacing: 3px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        /* Center Get Started Button */
        .center-btn {
            padding: 18px 50px;
            background: #4facfe;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 10px 25px rgba(79, 172, 254, 0.4);
        }

        .center-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 35px rgba(79, 172, 254, 0.6);
            background: #00f2fe;
        }

        /* Modal Overlay */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center; align-items: center;
            z-index: 2000;
        }

        .modal-box {
            background: #11141d;
            padding: 45px;
            border-radius: 25px;
            width: 400px;
            border: 1px solid #222;
            text-align: center;
        }

        .modal-box h2 { margin-bottom: 25px; font-size: 24px; color: #fff; }

        input {
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            background: #090b10;
            border: 1px solid #333;
            color: white;
            border-radius: 12px;
            outline: none;
            font-size: 1rem;
        }

        input:focus { border-color: #4facfe; }

        /* Error Label */
        #error-msg {
            color: #ff4d4d;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
            font-weight: 500;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: #4facfe;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 10px;
        }

        .close-btn {
            margin-top: 15px;
            color: #555;
            cursor: pointer;
            font-size: 14px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <button class="nav-btn" onclick="openModal()">Get Started</button>
    </div>

    <div class="main-lobby">
        <h1>SKY VIPER</h1>
        <p class="subtitle">All 2D Games In One Website</p>
        <button class="center-btn" onclick="openModal()">Get Started</button>
    </div>

    <div id="authModal" class="modal">
        <div class="modal-box">
            <h2>Enter Details</h2>
            <form id="authForm">
                <input type="email" id="email" placeholder="Email Address (e.g. name@gmail.com)" required>
                <input type="password" id="password" placeholder="Password (Min 6 chars)" required>
                
                <p id="error-msg">Incorrect email format or password too short!</p>
                
                <button type="submit" class="submit-btn">Continue</button>
            </form>
            <span class="close-btn" onclick="closeModal()">Close</span>
        </div>
    </div>

    <script>
        const modal = document.getElementById('authModal');
        const errorMsg = document.getElementById('error-msg');
        const authForm = document.getElementById('authForm');

        function openModal() {
            modal.style.display = 'flex';
            errorMsg.style.display = 'none';
            authForm.reset();
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        // Real Logic Fix
        authForm.onsubmit = function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            // Check if email has @ and password is at least 6 characters
            if (email.includes('@') && email.includes('.') && pass.length >= 6) {
                errorMsg.style.display = 'none';
                alert("Success! Welcome to SkyViper Lobby.");
                closeModal();
            } else {
                // Agar galat hai toh error dikhao
                errorMsg.style.display = 'block';
                errorMsg.innerText = "Incorrect email or password!";
            }
        };

        window.onclick = (event) => { if (event.target == modal) closeModal(); }
    </script>

</body>
</html>
