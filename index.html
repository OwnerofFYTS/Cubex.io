<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoidCraft | Enter the Void</title>
    <style>
        /* Deep Dark Blue Theme */
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #0a192f 0%, #020c1b 100%);
            color: #e6f1ff;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: flex-end;
            padding: 25px 60px;
            gap: 20px;
            align-items: center;
            z-index: 10;
        }

        .login-btn {
            color: #8892b0;
            background: none;
            border: none;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover { color: #64ffda; }

        .signup-btn {
            background-color: transparent;
            color: #64ffda;
            border: 1px solid #64ffda;
            padding: 10px 22px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .signup-btn:hover { background-color: rgba(100, 255, 218, 0.1); }

        /* Hero Section */
        .hero {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding-bottom: 80px;
        }

        h1 {
            font-size: clamp(50px, 12vw, 100px);
            margin: 0;
            font-weight: 800;
            color: #ccd6f6;
            letter-spacing: -2px;
        }

        .sub-text {
            color: #8892b0;
            font-size: 18px;
            margin-top: 5px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .get-started {
            margin-top: 65px;
            padding: 20px 65px;
            font-size: 18px;
            font-weight: 700;
            color: #0a192f;
            background-color: #64ffda;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(100, 255, 218, 0.2);
            transition: 0.3s;
        }

        .get-started:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(100, 255, 218, 0.4); }

        /* MODAL (Popup) STYLE */
        .modal {
            display: none; /* Shuru mein chupa hoga */
            position: fixed;
            z-index: 100;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(2, 12, 27, 0.9);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background-color: #112240;
            margin: 10% auto;
            padding: 40px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
            border: 1px solid #233554;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .modal-content h2 { color: #64ffda; margin-bottom: 25px; }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #0a192f;
            border: 1px solid #233554;
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #64ffda;
            color: #0a192f;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
        }

        .close-btn {
            color: #8892b0;
            float: right;
            font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <nav>
        <button class="login-btn" onclick="openModal('login')">Login</button>
        <button class="signup-btn" onclick="openModal('signup')">Sign Up</button>
    </nav>

    <div class="hero">
        <h1>VoidCraft</h1>
        <p class="sub-text">Beyond the horizon</p>
        <button class="get-started">Get Started</button>
    </div>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Login</h2>
            <input type="email" placeholder="Email Address">
            <input type="password" placeholder="Password">
            <button class="submit-btn" id="modalBtn">Submit</button>
        </div>
    </div>

    <script>
        const modal = document.getElementById("authModal");
        const title = document.getElementById("modalTitle");
        const btn = document.getElementById("modalBtn");

        function openModal(type) {
            modal.style.display = "block";
            if(type === 'login') {
                title.innerText = "Welcome Back";
                btn.innerText = "Login";
            } else {
                title.innerText = "Create Account";
                btn.innerText = "Join VoidCraft";
            }
        }

        function closeModal() {
            modal.style.display = "none";
        }

        // Modal ke bahar click karne se band ho jaye
        window.onclick = function(event) {
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>

</body>
</html>
