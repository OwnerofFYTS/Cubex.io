<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID AURA | FIXED</title>

<style>
body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; color:#fff; cursor:none; }
#game-container { position:relative; width:100%; height:100vh; }

#ui-overlay {
position:absolute; width:100%; height:100%;
display:flex; flex-direction:column; justify-content:center; align-items:center;
background:#000; z-index:10000; cursor:auto;
}

#crosshair {
position:absolute; top:50%; left:50%; width:16px; height:16px;
transform:translate(-50%,-50%);
}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:#fff;}
#crosshair::before{top:50%;width:100%;height:2px;}
#crosshair::after{left:50%;height:100%;width:2px;}

#stamina-bar { position:fixed; bottom:50px; left:50%; transform:translateX(-50%); width:220px; height:8px; background:#111; }
#stamina-fill { height:100%; background:#4CAF50; width:100%; }

#game-over {
position:absolute; width:100%; height:100%;
display:none; justify-content:center; align-items:center; flex-direction:column;
background:#000; z-index:20000;
}
</style>
</head>

<body>

<div id="game-container">
<div id="ui-overlay">
<h1 style="color:#4CAF50;">VOID AURA</h1>
<button id="start-btn">PLAY</button>
</div>

<div id="crosshair"></div>
<div id="stamina-bar"><div id="stamina-fill"></div></div>

<div id="game-over">
<h1 style="color:red;">MASHED!</h1>
<button onclick="location.reload()">RETRY</button>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const player = new THREE.Group();
player.position.set(40,1.7,40);
scene.add(player);
player.add(camera);

scene.add(new THREE.AmbientLight(0xffffff,0.8));

/* MAP */
const mapSize = 80;
const geo = new THREE.BoxGeometry(1,1,1);
const mat = new THREE.MeshStandardMaterial();
const mesh = new THREE.InstancedMesh(geo,mat,mapSize*mapSize);

let i=0;
const dummy = new THREE.Object3D();
const color = new THREE.Color();

for(let x=0;x<mapSize;x++){
for(let z=0;z<mapSize;z++){
dummy.position.set(x,0,z);
dummy.updateMatrix();
mesh.setMatrixAt(i,dummy.matrix);

let g=0.5+Math.random()*0.2;
color.setRGB(0.1,g,0.1);
mesh.setColorAt(i,color);
i++;
}}
scene.add(mesh);

/* BORDER */
const wallMat = new THREE.MeshStandardMaterial({color:0xff0000});
const h = 3;

function wall(x,z,w,d){
const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d),wallMat);
m.position.set(x,h/2,z);
scene.add(m);
}
wall(mapSize/2,-1,mapSize,1);
wall(mapSize/2,mapSize,mapSize,1);
wall(-1,mapSize/2,1,mapSize);
wall(mapSize,mapSize/2,1,mapSize);

/* POTATO */
const geoP = new THREE.SphereGeometry(1.5,32,32);
geoP.scale(1.2,1.5,1.1);

const stalker = new THREE.Mesh(geoP,new THREE.MeshStandardMaterial({color:0x8B4513}));

// 🔥 PERFECT HEIGHT FIX
const stalkerHeight = 1.5 * 1.5;
stalker.position.set(5,stalkerHeight,5);

scene.add(stalker);

/* CONTROLS */
const controls = new THREE.PointerLockControls(camera,document.body);
document.getElementById('start-btn').onclick=()=>controls.lock();
controls.addEventListener('lock',()=>document.getElementById('ui-overlay').style.display='none');

let keys={}, stamina=100;

onkeydown=e=>keys[e.code]=true;
onkeyup=e=>keys[e.code]=false;

function loop(){
requestAnimationFrame(loop);

if(controls.isLocked){

let speed = keys['ShiftLeft'] ? 0.26 : 0.13;

if(keys['KeyW']) controls.moveForward(speed);
if(keys['KeyS']) controls.moveForward(-speed);
if(keys['KeyA']) controls.moveRight(-speed);
if(keys['KeyD']) controls.moveRight(speed);

/* AI */
const dir = new THREE.Vector3().subVectors(player.position,stalker.position);
dir.y=0;
dir.normalize();
stalker.position.add(dir.multiplyScalar(0.13));

/* 🔥 PERFECT HITBOX */
const dx = player.position.x - stalker.position.x;
const dz = player.position.z - stalker.position.z;
const dist = Math.sqrt(dx*dx + dz*dz);

// realistic collision
const playerRadius = 0.5;
const stalkerRadiusHit = 1.4;

if(dist < playerRadius + stalkerRadiusHit){
document.getElementById('game-over').style.display='flex';
controls.unlock();
}

}

renderer.render(scene,camera);
}
loop();
</script>

</body>
</html>
