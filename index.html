<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID AURA | FIXED POTATO</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        #game-container { position: relative; width: 100%; height: 100vh; }
        
        /* UI Layers - High Z-Index to stay on top */
        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #201000 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10000;
        }

        #hotbar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 9999; pointer-events: none;
        }
        .slot {
            width: 70px; height: 70px; background: rgba(30, 20, 10, 0.8);
            border: 3px solid #444; display: flex; justify-content: center;
            align-items: center; font-weight: bold; position: relative;
        }
        .slot.active { border-color: #ffaa00; box-shadow: 0 0 15px #ffaa00; background: rgba(60, 40, 10, 0.9); }
        .slot-num { position: absolute; top: 5px; left: 8px; font-size: 12px; color: #aaa; }
        .item-icon { font-size: 2rem; }

        #stamina-box {
            position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
            width: 200px; height: 8px; background: #222; border: 1px solid #ffaa00; z-index: 9999;
        }
        #stamina-fill { width: 100%; height: 100%; background: #ffaa00; }

        #crosshair { position: absolute; top: 50%; left: 50%; width: 5px; height: 5px; background: #ffaa00; border-radius: 50%; z-index: 5000; transform: translate(-50%, -50%); }
        
        #game-over-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(40, 20, 0, 0.9); display: none; z-index: 20000;
            flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-overlay">
        <h1 style="font-size: 50px; color: #ffaa00; letter-spacing: 10px;">VOID AURA</h1>
        <button id="start-btn" style="padding: 15px 50px; font-size: 20px; background: none; border: 2px solid #ffaa00; color: #ffaa00; cursor: pointer;">PLAY</button>
    </div>

    <div id="hotbar">
        <div class="slot" id="slot-1"><span class="slot-num">1</span><span class="item-icon">🔦</span></div>
        <div class="slot" id="slot-2"><span class="slot-num">2</span></div>
        <div class="slot" id="slot-3"><span class="slot-num">3</span></div>
        <div class="slot" id="slot-4"><span class="slot-num">4</span></div>
    </div>

    <div id="stamina-box"><div id="stamina-fill"></div></div>
    <div id="crosshair"></div>
    
    <div id="game-over-screen">
        <h1 style="color: #ffaa00; font-size: 60px;">MASHED!</h1>
        <button onclick="location.reload()" style="padding: 10px 30px; color: #fff; background: none; border: 1px solid #fff; cursor: pointer;">RETRY</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>

<script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050300);
    scene.fog = new THREE.Fog(0x050300, 1, 40);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('game-container').appendChild(renderer.domElement);

    const player = new THREE.Group();
    player.position.set(0, 1.7, 0);
    scene.add(player);
    player.add(camera);

    // Flashlight (Long range effect)
    const torch = new THREE.SpotLight(0xffeebb, 0, 45, Math.PI/5, 0.4);
    camera.add(torch);
    torch.target.position.set(0, 0, -1);
    camera.add(torch.target);

    scene.add(new THREE.AmbientLight(0xffffff, 0.03));
    scene.add(new THREE.GridHelper(400, 80, 0x332200, 0x111111));

    // --- REAL POTATO (NO EXTERNAL TEXTURE NEEDED) ---
    const potatoGeo = new THREE.SphereGeometry(1, 32, 32);
    potatoGeo.scale(1.2, 1.6, 1.1); // Potato Shape
    const potatoMat = new THREE.MeshStandardMaterial({ 
        color: 0x6e4b2e, // Deep Potato Brown
        roughness: 1.0,
        metalness: 0.0,
        flatShading: false
    });
    const stalker = new THREE.Mesh(potatoGeo, potatoMat);
    stalker.position.set(0, 1.6, 25);
    scene.add(stalker);

    const controls = new THREE.PointerLockControls(camera, document.body);
    const startBtn = document.getElementById('start-btn');

    startBtn.onclick = () => {
        controls.lock();
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    };

    controls.addEventListener('lock', () => {
        document.getElementById('ui-overlay').style.display = 'none';
    });

    let keys = {};
    let stamina = 100;
    let activeSlot = null;

    window.onkeydown = (e) => {
        keys[e.code] = true;
        if(e.key >= '1' && e.key <= '4') selectSlot(parseInt(e.key));
    };
    window.onkeyup = (e) => keys[e.code] = false;

    function selectSlot(n) {
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
        if (activeSlot === n) {
            activeSlot = null;
            if(n === 1) torch.intensity = 0;
        } else {
            activeSlot = n;
            document.getElementById(`slot-${n}`).classList.add('active');
            if(n === 1) torch.intensity = 5.0; // High Power Torch
            else torch.intensity = 0;
        }
    }

    let lastT = performance.now();
    function gameLoop() {
        requestAnimationFrame(gameLoop);
        const time = performance.now();
        const delta = (time - lastT) / 1000;

        if (controls.isLocked) {
            // Movement Logic
            let isRunning = keys['ControlLeft'] && stamina > 0;
            let speed = isRunning ? 35 : 22;
            
            if (isRunning && (keys['KeyW'] || keys['KeyS'])) stamina = Math.max(0, stamina - 30 * delta);
            else stamina = Math.min(100, stamina + 15 * delta);
            document.getElementById('stamina-fill').style.width = stamina + "%";

            if (keys['KeyW']) controls.moveForward(speed * delta);
            if (keys['KeyS']) controls.moveForward(-speed * delta);
            if (keys['KeyA']) controls.moveRight(-speed * delta);
            if (keys['KeyD']) controls.moveRight(speed * delta);

            // Potato AI (Fixed Scale)
            const dir = new THREE.Vector3().subVectors(player.position, stalker.position);
            dir.y = 0; dir.normalize();
            stalker.position.x += dir.x * 5 * delta; 
            stalker.position.z += dir.z * 5 * delta;
            stalker.lookAt(player.position.x, 1.6, player.position.z);

            // Collision (Screen Touch)
            if (player.position.distanceTo(stalker.position) < 2.3) {
                document.getElementById('game-over-screen').style.display = 'flex';
                controls.unlock();
            }
        }
        lastT = time;
        renderer.render(scene, camera);
    }
    gameLoop();

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
